name: Deploy to VPS

on:
  push:
    branches:
      - vps_setup
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy staging-b1admin on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            git -C /home/trix/churchapps/B1Admin pull origin vps_setup &&
            cd /home/trix/churchapps &&
            docker compose -f docker-compose.3env.yml build --no-cache staging-b1admin &&
            docker compose -f docker-compose.3env.yml up -d --force-recreate staging-b1admin
          "

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy prod-b1admin on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            git -C /home/trix/churchapps/B1Admin pull origin vps_setup &&
            cd /home/trix/churchapps &&
            docker compose -f docker-compose.3env.yml build --no-cache prod-b1admin &&
            docker compose -f docker-compose.3env.yml up -d --force-recreate prod-b1admin
          "
